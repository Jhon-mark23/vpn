# ============================================================
# MARCSCRIPT NGINX CONFIG
# Optimized for 1GB RAM / 1 CPU VPS
# Compatible with Ubuntu 24.04 & Debian 12
# ============================================================

user www-data;
worker_processes 1;
pid /var/run/nginx.pid;

# Error log
error_log /var/log/nginx/error.log warn;

events {
    multi_accept on;
    worker_connections 1024;
    use epoll;
}

http {
    # ============================================================
    # BASIC SETTINGS
    # ============================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ============================================================
    # PERFORMANCE OPTIMIZATION (1GB RAM)
    # ============================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    keepalive_timeout 65;
    keepalive_requests 100;
    
    types_hash_max_size 2048;
    types_hash_bucket_size 64;
    
    # Client limits
    client_max_body_size 32M;
    client_header_buffer_size 8m;
    large_client_header_buffers 8 8m;
    
    # FastCGI optimization
    fastcgi_buffer_size 8m;
    fastcgi_buffers 8 8m;
    fastcgi_read_timeout 600;
    
    # File cache
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ============================================================
    # GZIP COMPRESSION
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_disable "msie6";
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/json 
        application/javascript 
        application/xml+rss 
        application/rss+xml 
        application/atom+xml 
        image/svg+xml;

    # ============================================================
    # REAL IP HEADERS (CloudFlare & Incapsula)
    # ============================================================
    # CloudFlare IPv4
    set_real_ip_from 199.27.128.0/21;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/12;
    
    # CloudFlare IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    
    # Incapsula
    set_real_ip_from 199.83.128.0/21;
    set_real_ip_from 198.143.32.0/19;
    set_real_ip_from 149.126.72.0/21;
    set_real_ip_from 103.28.248.0/22;
    set_real_ip_from 45.64.64.0/22;
    set_real_ip_from 185.11.124.0/22;
    set_real_ip_from 192.230.64.0/18;
    
    real_ip_header CF-Connecting-IP;
    
    # ============================================================
    # SECURITY HEADERS (Optional - uncomment if needed)
    # ============================================================
    # add_header X-Frame-Options "SAMEORIGIN" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header X-XSS-Protection "1; mode=block" always;
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================================
    # INCLUDE VIRTUAL HOSTS
    # ============================================================
    include /etc/nginx/conf.d/*.conf;
}